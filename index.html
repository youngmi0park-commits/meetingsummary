<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meeting Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="layout">
    <!-- Header -->
    <header class="header">
      <div class="brand">
        <h1>Meeting Dashboard</h1>
        <span class="badge">AI Powered</span>
      </div>
      <div class="settings">
        <div class="input-group">
          <label for="apiKey">Gemini API Key</label>
          <input type="password" id="apiKey" placeholder="AIzaSy...">
        </div>
        <div class="input-group">
          <label for="promptType">Model</label>
          <select id="promptType">
            <option value="gemini-1.5-flash">Gemini 1.5 Flash (추천/무료)</option>
          </select>
        </div>
      </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
      
      <!-- Left Panel: Recording & Transcript -->
      <section class="panel transcript-panel">
        <div class="panel-header">
          <h2>Meeting Transcript</h2>
          <div class="controls">
             <button id="btnRecord" class="btn btn-primary">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
                Start Recording
             </button>
             <button id="btnClear" class="btn btn-secondary">Clear</button>
          </div>
        </div>
        <div class="transcription-container">
          <div id="status" class="status-indicator">Ready to record</div>
          <textarea id="transcript" placeholder="회의 내용이 여기에 실시간으로 기록됩니다..."></textarea>
        </div>
      </section>

      <!-- Right Panel: AI Generation & Export -->
      <section class="panel results-panel">
        <div class="panel-header">
          <h2>AI Summary & Actions</h2>
          <button id="btnSummarize" class="btn btn-primary outline" disabled>
            Generate Summary
          </button>
        </div>
        
        <div class="summary-container" id="summaryView">
          <div class="empty-state">
            <p>녹음을 완료한 후 <strong>Generate Summary</strong> 버튼을 눌러주세요.</p>
          </div>
          <div class="summary-content" style="display: none;">
            <div class="summary-section">
              <h3>📌 핵심 요약 (Summary)</h3>
              <div id="contentSummary" class="content-box"></div>
            </div>
            <div class="summary-section">
              <h3>🗓️ 일정 (Schedule)</h3>
              <div id="contentSchedule" class="content-box"></div>
            </div>
            <div class="summary-section">
              <h3>✅ 액션 아이템 (Action Items)</h3>
              <div id="contentActionItems" class="content-box"></div>
            </div>
          </div>
        </div>

        <div class="export-controls">
          <button id="btnObsidian" class="btn btn-danger" disabled>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>
            Save to Obsidian
          </button>
          <button id="btnEmail" class="btn btn-secondary" disabled>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
            Copy for Email
          </button>
        </div>
      </section>

    </main>
  </div>
  <script src="app.js"></script>
</body>
</html>
