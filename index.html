<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meeting Dashboard · LG</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">

  <!-- ── Header ── -->
  <header>
    <div class="brand">
      <h1>Meeting Dashboard</h1>
      <span class="badge">AI Powered</span>
    </div>
    <div class="hdr-right">
      <div class="fg">
        <label>Gemini API Key</label>
        <input type="password" id="apiKey" placeholder="AIzaSy...">
        <div class="key-hint">무료 키 → <a href="https://aistudio.google.com/apikey" target="_blank">aistudio.google.com/apikey</a></div>
      </div>
      <div class="fg">
        <label>Model</label>
        <select id="modelSel">
          <option value="gemini-2.5-flash">gemini-2.5-flash ★ (10RPM/250/day)</option>
          <option value="gemini-2.5-flash-lite">gemini-2.5-flash-lite (15RPM/1000/day)</option>
          <option value="gemini-1.5-flash">gemini-1.5-flash (15RPM/1500/day)</option>
        </select>
      </div>
      <div id="quotaBadge" class="quota-badge quota-ok">남은 횟수: —</div>
    </div>
  </header>

  <main>

    <!-- ── LEFT: Transcript ── -->
    <section class="panel">
      <div class="ph">
        <h2>🎙️ Meeting Transcript</h2>
        <div class="ph-btns">
          <button id="btnRecord" class="btn btn-red">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/>
              <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
              <line x1="12" y1="19" x2="12" y2="23"/>
              <line x1="8" y1="23" x2="16" y2="23"/>
            </svg>
            Start Recording
          </button>
          <button id="btnClear" class="btn btn-ghost">Clear</button>
        </div>
      </div>
      <div class="tb">
        <div class="status" id="status">Ready to record</div>
        <textarea id="transcript" placeholder="회의 내용이 여기에 실시간으로 기록됩니다...&#10;직접 타이핑하거나 음성 녹음을 사용하세요."></textarea>
      </div>
    </section>

    <!-- ── RIGHT: Meta + Summary ── -->
    <section class="panel">
      <div class="ph">
        <h2>📋 Meeting Summary</h2>
        <button id="btnSummarize" class="btn btn-outline" disabled>✨ Generate Summary</button>
      </div>

      <div class="rb" id="rb">
        <div class="loading" id="loading">
          <div class="spinner"></div>
          <p>Gemini 분석 중...</p>
        </div>

        <!-- ── 회의 정보 입력 (항상 표시) ── -->
        <div class="meta-section">
          <div class="meta-title">회의 정보</div>
          <div class="meta-grid">
            <div class="meta-field full">
              <label>📋 회의명</label>
              <input type="text" id="mTitle" placeholder="예) Q2 마케팅 전략 회의">
            </div>
            <div class="meta-field">
              <label>📅 일시</label>
              <input type="text" id="mDate" placeholder="2025-01-23 14:00">
            </div>
            <div class="meta-field">
              <label>📍 장소</label>
              <input type="text" id="mLocation" placeholder="예) 회의실 A / Zoom">
            </div>
            <div class="meta-field full">
              <label>👥 참석자</label>
              <input type="text" id="mAttendees" placeholder="예) 김영업 팀장, 박마케팅, 이기획 (쉼표로 구분)">
            </div>
            <div class="meta-field full">
              <label>📌 아젠다</label>
              <input type="text" id="mAgenda" placeholder="예) Q2 캠페인 성과 리뷰 / 예산 재배분 논의 / 다음 분기 계획">
            </div>
            <div class="meta-field full">
              <label>🏷️ 해시태그</label>
              <input type="text" id="mTags" placeholder="예) #마케팅 #Q2 #전략 #LG전자">
            </div>
          </div>
        </div>

        <!-- ── 에러 ── -->
        <div class="err-box" id="errBox"></div>

        <!-- ── Empty state ── -->
        <div class="empty" id="emptyState">
          <svg width="42" height="42" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
          </svg>
          <p>녹음 또는 텍스트 입력 후<br><strong>✨ Generate Summary</strong> 클릭</p>
        </div>

        <!-- ── AI 결과 카드 ── -->
        <div class="cards" id="cards" style="display:none">
          <div class="card card-summary">
            <h3><span class="card-icon">📝</span> 핵심 요약</h3>
            <div class="card-body" id="cSummary"></div>
          </div>
          <div class="card-row">
            <div class="card card-schedule">
              <h3><span class="card-icon">🗓️</span> 일정 · 마감일</h3>
              <div class="card-body" id="cSchedule"></div>
            </div>
            <div class="card card-action">
              <h3><span class="card-icon">✅</span> 액션 아이템</h3>
              <div class="card-body" id="cAction"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- ── Export ── -->
      <div class="export">
        <button id="btnObsidian" class="btn btn-export-obs" disabled>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5z"/>
            <polyline points="14 2 14 8 20 8"/>
          </svg>
          Obsidian 저장
        </button>
        <button id="btnEmail" class="btn btn-export-mail" disabled>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
          Outlook 복사
        </button>
        <button id="btnMd" class="btn btn-export-md" disabled>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          .md 다운로드
        </button>
      </div>
    </section>

  </main>
</div>

<div class="toast" id="toast"></div>
<script src="app.js"></script>
</body>
</html>
